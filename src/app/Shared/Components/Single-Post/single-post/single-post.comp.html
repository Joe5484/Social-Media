@for (post of postlist; track post._id) {
<div class="w-[50vw] mx-auto mb-4">
    <section class="overflow-visible rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="p-4">
            <div class="flex items-center gap-3">
                <a class="shrink-0" href="#">
                    <img alt="" class="h-11 w-11 rounded-full object-cover" [src]="post.user.photo">
                </a>
                <div class="min-w-0 flex-1">
                    <a class="truncate text-sm font-bold text-foreground hover:underline"
                        href="#">{{post.user.name}}</a>
                    <div class="flex flex-wrap items-center gap-1 text-xs text-muted-foreground">
                        {{post.user.name}}
                        <button type="button"
                            class="rounded px-0.5 py-0.5 text-xs font-semibold text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 hover:underline">
                            {{post.createdAt|date:'short'}}
                        </button>
                        <span class="mx-1">·</span>
                        <span class="inline-flex items-center gap-1">
                            <i class="fa-solid fa-earth-americas text-xs"></i> Public
                        </span>
                    </div>
                </div>
                <div class="relative">
                    <button class="rounded-full p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-700">
                        <i class="fa-solid fa-ellipsis"></i>
                    </button>
                </div>
            </div>
            <div class="mt-3">
                <p class="whitespace-pre-wrap text-sm leading-relaxed text-foreground">{{post.body}}</p>
            </div>
        </div>

        <div class="max-h-155 overflow-hidden border-y border-slate-200">
            <button type="button" class="group relative block w-full cursor-zoom-in">
                @if (post.image) {
                    <img alt="post" class="w-full object-cover" [src]="post.image">
                }
            </button>
        </div>

        <!-- Likes / Comments / Shares count -->
        <div class="px-4 pb-2 pt-3 text-sm text-slate-500">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="cursor-pointer inline-flex h-5 w-5 items-center justify-center rounded-full bg-[#1877f2] text-white">
                        <i class="fa-solid fa-thumbs-up text-xs"></i>
                    </span>
                    <span class="font-semibold">{{post.likesCount}}</span>
                </div>
                <div class="flex flex-wrap items-center gap-2 text-xs sm:gap-3 sm:text-sm">
                    <span class="inline-flex items-center gap-1">
                        <i class="fa-solid fa-retweet"></i> {{post.sharesCount}}
                    </span>
                    <span>{{post.commentsCount}} comments</span>
                    <button [routerLink]="['/post-details',post._id]" #showCommentsBtn
                        class="rounded-md px-2 py-1 text-xs font-bold text-[#1877f2] hover:bg-[#e7f3ff]">
                        View details
                    </button>
                </div>
            </div>
        </div>

        <div class="mx-4 border-t border-slate-200"></div>

        <!-- Like / Comment / Share buttons -->
        <div class="grid grid-cols-3 gap-1 p-1">
            <button (click)="likeUnlikePost(post._id)"
                class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                <i class="fa-regular fa-thumbs-up text-lg"></i>
                <span>Like</span>
            </button>
            <button #showCommentsBtn
                class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                <i class="fa-regular fa-comment-dots text-lg"></i>
                <span>Comment</span>
            </button>
            <button
                class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                <i class="fa-solid fa-share-nodes text-lg"></i>
                <span>Share</span>
            </button>
        </div>

        <!-- Comments list -->
        @defer (on interaction(showCommentsBtn)) {
            <app-comments [postId]="post._id"></app-comments>
        }

        <!-- Create comment -->
        <form (submit)="createComment($event,post._id)" class="px-4 pb-4 pt-2">
            <div class="flex items-start gap-2">
                <img alt="user" class="h-9 w-9 rounded-full object-cover"
                    src="https://pub-3cba56bacf9f4965bbb0989e07dada12.r2.dev/linkedPosts/default-profile.png">
                <div
                    class="w-full rounded-2xl border border-slate-200 bg-[#f0f2f5] px-2.5 py-1.5 focus-within:border-[#c7dafc] focus-within:bg-white">
                    <textarea placeholder="Comment here" rows="1" [formControl]="commentValue"
                        class="max-h-35 min-h-10 w-full resize-none bg-transparent px-2 py-1.5 text-sm leading-5 outline-none placeholder:text-slate-500">
                    </textarea>
                    <div class="mt-1 flex items-center justify-between">
                        <div class="flex items-center gap-1">
                            <label
                                class="inline-flex cursor-pointer items-center justify-center rounded-full p-2 text-slate-500 transition hover:bg-slate-200 hover:text-emerald-600">
                                <i class="fa-regular fa-image text-base"></i>
                                <input accept="image/*" class="hidden" type="file">
                            </label>
                            <button type="button"
                                class="inline-flex items-center justify-center rounded-full p-2 text-slate-500 transition hover:bg-slate-200 hover:text-amber-500">
                                <i class="fa-regular fa-face-smile text-base"></i>
                            </button>
                        </div>
                        <button
                            class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-[#1877f2] text-white shadow-sm transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:bg-[#9ec5ff] disabled:opacity-100">
                            <i class="fa-solid fa-paper-plane text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </form>

    </section>
</div>
}
