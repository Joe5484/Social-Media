
@for (comment of commentsList; track comment._id){

<div class="relative flex items-start gap-2"><img alt="youssef" class="mt-0.5 h-8 w-8 rounded-full object-cover"
    [src]="comment.commentCreator.photo">
  <div class="min-w-0 flex-1">
    <div class="relative inline-block max-w-full rounded-2xl bg-[#f0f2f5] px-3 py-2">
      <div class="flex items-start justify-between gap-2">
        <div>
          <p class="text-xs font-bold text-slate-900">{{comment.commentCreator.name}} </p>
          <p class="text-xs text-slate-500"> {{comment.commentCreator.user}} · {{comment.createdAt}}</p>
        </div>
      </div>
      <p class="mt-1 whitespace-pre-wrap text-sm text-slate-800"> {{comment.content}} </p>
      
    </div>
    <div class="mt-1.5 flex items-center justify-between px-1">
      <div class="flex items-center gap-4"><span class="text-xs font-semibold text-slate-400">{{comment.createdAt}}
          AM</span><button class="text-xs font-semibold hover:underline disabled:opacity-60 text-slate-500">Like
          ({{comment.likesCount}})</button><button
          class="text-xs font-semibold transition hover:underline disabled:opacity-60 text-slate-500 hover:text-[#1877f2]">Reply</button>
      </div>
    </div>
  </div>
</div>
}
